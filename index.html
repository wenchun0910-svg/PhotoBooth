<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雲端智能拍貼機</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- QRCode.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        /* 閃光燈特效 */
        #flash-overlay {
            transition: opacity 0.1s ease-out;
            pointer-events: none;
        }
        /* 隱藏捲軸但可滾動 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 漂亮的自訂捲軸 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>

    <!-- 極限防呆：若外部模組載入失敗，3秒後強制進入系統 -->
    <script>
        setTimeout(() => {
            const loader = document.getElementById('global-loading');
            if (loader && !loader.classList.contains('hidden')) {
                loader.classList.add('hidden');
                const booth = document.getElementById('view-booth');
                if (booth) booth.classList.remove('hidden');
                // 同時解除內部相機 loading 狀態，避免完全卡死
                const innerLoader = document.getElementById('loading-state');
                if (innerLoader) innerLoader.classList.add('hidden');
                console.warn("連線逾時，強制啟動離線模式");
            }
        }, 3000);
    </script>
</head>
<body class="min-h-screen text-gray-800 flex flex-col overflow-x-hidden" style="background-image: url('bk.jpg'); background-size: cover; background-position: center; background-attachment: fixed;">

    <!-- 全局載入畫面 -->
    <div id="global-loading" class="flex-1 flex flex-col items-center justify-center absolute inset-0 z-50 bg-white/80 backdrop-blur-sm">
        <div class="w-32 h-32 md:w-40 md:h-40 rounded-full overflow-hidden border-4 border-white shadow-lg mb-4 animate-bounce bg-white flex items-center justify-center">
            <img src="logo1.png" alt="Loading Logo" class="w-full h-full object-cover transform scale-[1.5] -translate-x-[8%] -translate-y-[4%]">
        </div>
        <p class="text-gray-800 font-bold tracking-widest text-lg">系統啟動中...</p>
    </div>

    <!-- 主視圖：拍貼機畫面 -->
    <div id="view-booth" class="flex-1 flex flex-col items-center justify-center p-2 sm:p-4 relative hidden w-full overflow-y-auto no-scrollbar">
        <div class="flex items-center justify-center mb-2 md:mb-4">
            <div class="w-12 h-12 md:w-16 md:h-16 lg:w-20 lg:h-20 mr-3 rounded-full overflow-hidden border-2 border-white shadow-md bg-white flex items-center justify-center shrink-0">
                <img src="logo1.png" alt="Logo" class="w-full h-full object-cover transform scale-[1.6] -translate-x-[8%] -translate-y-[4%]">
            </div>
            <h1 class="text-2xl md:text-3xl lg:text-4xl font-bold text-pink-600 tracking-wider drop-shadow-md" style="text-shadow: 1px 1px 2px rgba(255,255,255,0.8);">智能拍貼機</h1>
        </div>
        
        <!-- 相機與畫布容器 -->
        <div class="relative w-full max-w-[95vw] sm:max-w-[500px] md:max-w-[60vh] lg:max-w-[70vh] xl:max-w-[75vh] aspect-square bg-gray-900 rounded-3xl shadow-2xl overflow-hidden ring-4 ring-white shrink-0">
            <video id="webcam" autoplay playsinline class="hidden"></video>
            <canvas id="output_canvas" class="w-full h-full object-cover"></canvas>
            
            <div id="flash-overlay" class="absolute inset-0 bg-white opacity-0 z-50"></div>
            
            <div id="countdown-text" class="absolute inset-0 flex items-center justify-center text-white text-9xl font-bold drop-shadow-lg opacity-0 z-40" style="text-shadow: 0 4px 10px rgba(0,0,0,0.5);"></div>
            
            <div id="loading-state" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-900 bg-opacity-80 text-white z-30">
                <i class="fa-solid fa-spinner fa-spin text-4xl mb-3"></i>
                <p id="loading-text" class="text-sm">正在初始化相機與 AI...</p>
            </div>

            <div id="gesture-hint" class="absolute top-4 left-0 right-0 text-center z-20 pointer-events-none hidden">
                <span class="bg-black bg-opacity-50 text-white px-4 md:px-6 py-2 md:py-3 rounded-full text-sm md:text-base backdrop-blur-sm">
                    <i class="fa-solid fa-hand text-yellow-300"></i> 對鏡頭比 🖐 開始自拍
                </span>
            </div>
        </div>

        <!-- 控制按鈕 -->
        <div class="mt-4 md:mt-6 flex flex-col items-center z-10 w-full max-w-[95vw] sm:max-w-[500px] md:max-w-[60vh] lg:max-w-[70vh] xl:max-w-[75vh] shrink-0 mb-4">
            
            <!-- 拍攝模式切換 -->
            <div class="flex gap-3 justify-center w-full px-4 md:px-8 mb-4">
                <button id="btn-mode-1" class="flex-1 py-2 md:py-2.5 rounded-full text-sm md:text-base font-bold transition shadow-md bg-pink-500 text-white border-2 border-pink-500">
                    <i class="fa-solid fa-camera mr-1"></i> 拍 1 張
                </button>
                <button id="btn-mode-4" class="flex-1 py-2 md:py-2.5 rounded-full text-sm md:text-base font-bold transition shadow-sm bg-white/90 text-gray-600 hover:bg-white border-2 border-gray-200">
                    <i class="fa-solid fa-border-all mr-1"></i> 拍 4 張 (四格)
                </button>
            </div>

            <div class="flex items-center justify-between w-full px-4 md:px-8 mb-3 md:mb-5">
                <button id="btn-prev-frame" class="w-12 h-12 md:w-16 md:h-16 lg:w-18 lg:h-18 bg-white rounded-full shadow-lg text-pink-500 hover:bg-pink-50 transition flex items-center justify-center text-xl md:text-2xl transform hover:-translate-x-1">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <button id="btn-take-photo" class="w-20 h-20 md:w-28 md:h-28 lg:w-32 lg:h-32 bg-pink-500 rounded-full shadow-2xl text-white hover:bg-pink-600 transition flex items-center justify-center border-4 border-white transform hover:scale-105 z-10">
                    <i class="fa-solid fa-camera text-3xl md:text-5xl lg:text-6xl"></i>
                </button>
                <button id="btn-next-frame" class="w-12 h-12 md:w-16 md:h-16 lg:w-18 lg:h-18 bg-white rounded-full shadow-lg text-pink-500 hover:bg-pink-50 transition flex items-center justify-center text-xl md:text-2xl transform hover:translate-x-1">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
            
            <button id="btn-open-frame-select" class="flex items-center gap-2 bg-white/80 backdrop-blur px-5 md:px-6 py-2 md:py-3 rounded-full shadow-sm text-gray-700 text-sm md:text-lg font-bold border border-white/50 hover:bg-white transition transform hover:scale-105 active:scale-95">
                <i class="fa-solid fa-image text-pink-500"></i> 目前邊框：<span id="current-frame-name" class="text-pink-600 truncate max-w-[120px] md:max-w-[250px]">載入中...</span>
                <i class="fa-solid fa-list-ul text-gray-400 ml-1"></i>
            </button>
        </div>

        <button id="btn-go-admin" class="absolute top-4 right-4 bg-white/90 backdrop-blur shadow-md px-4 py-2 rounded-full text-gray-700 hover:text-pink-600 transition text-sm font-bold z-50 border border-gray-100">
            <i class="fa-solid fa-user-shield text-pink-500 mr-1"></i> 管理後台
        </button>
    </div>

    <!-- 拍攝結果與下載視圖 -->
    <div id="view-result" class="flex-1 flex flex-col items-center justify-center p-4 relative hidden">
        <div class="glass-panel p-6 md:p-10 lg:p-12 rounded-3xl shadow-2xl max-w-2xl lg:max-w-4xl xl:max-w-5xl w-full flex flex-col md:flex-row gap-8 items-center">
            <div class="w-full md:w-1/2 flex flex-col items-center">
                <img id="result-image" class="w-full aspect-square object-cover rounded-xl shadow-md border-4 border-white" src="" alt="拍攝結果">
            </div>
            
            <div class="w-full md:w-1/2 flex flex-col items-center md:items-start text-center md:text-left">
                <h2 class="text-3xl md:text-4xl font-bold text-gray-800 mb-2">拍攝完成！✨</h2>
                <p class="text-gray-600 md:text-lg mb-6">掃描下方 QRCode 或點擊按鈕儲存這份美好回憶。</p>
                
                <div class="bg-white p-4 rounded-xl shadow-inner mb-6 inline-block">
                    <div id="qrcode"></div>
                </div>

                <div class="flex gap-4 w-full justify-center md:justify-start">
                    <button id="btn-retake" class="px-6 py-3 md:px-8 md:py-4 bg-gray-200 text-gray-700 rounded-full font-semibold md:text-lg hover:bg-gray-300 transition w-1/2 md:w-auto">
                        <i class="fa-solid fa-arrow-rotate-left mr-2"></i> 重拍
                    </button>
                    <button id="btn-download" class="px-6 py-3 md:px-8 md:py-4 bg-pink-500 text-white rounded-full font-semibold md:text-lg hover:bg-pink-600 transition shadow-lg w-1/2 md:w-auto">
                        <i class="fa-solid fa-download mr-2"></i> 下載
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 單純瀏覽照片視圖 -->
    <div id="view-shared" class="flex-1 flex flex-col items-center justify-center p-4 bg-gray-900 hidden">
        <div class="max-w-md w-full flex flex-col items-center gap-6">
            <h1 class="text-white text-2xl font-bold tracking-widest text-center">✨ 回憶珍藏 ✨</h1>
            <div id="shared-loading" class="text-white"><i class="fa-solid fa-spinner fa-spin text-3xl"></i></div>
            <img id="shared-image" class="w-full aspect-square object-cover rounded-xl shadow-2xl border-4 border-white hidden" src="" alt="Shared Photo">
            <button id="btn-shared-download" class="hidden w-full py-4 bg-pink-500 text-white rounded-full font-bold text-lg hover:bg-pink-600 transition shadow-lg mt-4">
                <i class="fa-solid fa-download mr-2"></i> 儲存照片至手機
            </button>
            <a href="?" class="text-gray-400 hover:text-white underline mt-4">我也想拍一張！</a>
        </div>
    </div>

    <!-- 邊框選擇選單視窗 -->
    <div id="modal-frame-select" class="fixed inset-0 bg-black/60 z-50 flex items-end sm:items-center justify-center hidden backdrop-blur-sm p-4 pb-0 sm:pb-4 transition-opacity">
        <div class="bg-white rounded-t-3xl sm:rounded-3xl p-6 md:p-8 w-full max-w-md sm:max-w-2xl lg:max-w-4xl shadow-2xl relative max-h-[60vh] sm:max-h-[80vh] flex flex-col">
            <div class="flex justify-between items-center mb-4 md:mb-6 border-b pb-3 md:pb-4">
                <h2 class="text-xl md:text-3xl font-bold text-gray-800"><i class="fa-solid fa-border-all text-pink-500 mr-2"></i>選擇邊框</h2>
                <button id="btn-close-frame-select" class="text-gray-400 hover:text-gray-800 bg-gray-100 hover:bg-gray-200 rounded-full w-8 h-8 md:w-12 md:h-12 flex items-center justify-center transition"><i class="fa-solid fa-xmark md:text-xl"></i></button>
            </div>
            <div id="frame-select-grid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-3 md:gap-6 overflow-y-auto no-scrollbar pb-6">
                <!-- 縮圖將由 JS 動態生成 -->
            </div>
        </div>
    </div>

    <!-- 修改密碼視窗 -->
    <div id="modal-change-password" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center hidden backdrop-blur-sm p-4 transition-opacity">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl relative">
            <button id="btn-close-password-modal" class="absolute top-4 right-4 text-gray-400 hover:text-gray-800 bg-gray-100 hover:bg-gray-200 rounded-full w-8 h-8 flex items-center justify-center transition"><i class="fa-solid fa-xmark"></i></button>
            <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><i class="fa-solid fa-key text-pink-500 mr-2"></i>修改密碼</h2>
            <form id="form-change-password" class="flex flex-col gap-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">新密碼</label>
                    <input type="password" id="new-password" required placeholder="輸入新密碼 (至少6碼)" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-300 bg-gray-50">
                </div>
                <button type="submit" class="w-full bg-pink-500 text-white py-3 rounded-xl text-base font-bold hover:bg-pink-600 transition mt-2 shadow-md">更新密碼</button>
            </form>
            <p id="change-pwd-msg" class="text-sm text-center mt-4 hidden"></p>
        </div>
    </div>

    <!-- 新增協作者視窗 -->
    <div id="modal-add-collaborator" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center hidden backdrop-blur-sm p-4 transition-opacity">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl relative">
            <button id="btn-close-collab-modal" class="absolute top-4 right-4 text-gray-400 hover:text-gray-800 bg-gray-100 hover:bg-gray-200 rounded-full w-8 h-8 flex items-center justify-center transition"><i class="fa-solid fa-xmark"></i></button>
            <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><i class="fa-solid fa-user-plus text-pink-500 mr-2"></i>新增協作者</h2>
            <form id="form-add-collaborator" class="flex flex-col gap-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">協作者帳號</label>
                    <input type="text" id="new-collab-username" required placeholder="例：user1" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-300 bg-gray-50">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">初始密碼</label>
                    <input type="password" id="new-collab-password" required placeholder="設定密碼 (至少6碼)" class="w-full px-4 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-300 bg-gray-50">
                </div>
                <button type="submit" class="w-full bg-gray-800 text-white py-3 rounded-xl text-base font-bold hover:bg-gray-900 transition mt-2 shadow-md">建立帳號</button>
            </form>
            <p id="add-collab-msg" class="text-sm text-center mt-4 hidden"></p>
        </div>
    </div>

    <!-- 管理員登入視窗 -->
    <div id="modal-admin-login" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center hidden backdrop-blur-sm p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl relative">
            <button id="btn-close-login" class="absolute top-4 right-4 text-gray-400 hover:text-gray-800"><i class="fa-solid fa-xmark text-xl"></i></button>
            <h2 id="login-title" class="text-2xl font-bold text-center text-gray-800 mb-6">管理員登入</h2>
            
            <form id="form-login" class="flex flex-col gap-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">帳號</label>
                    <input type="text" id="login-username" placeholder="預設: admin" required class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">密碼</label>
                    <input type="password" id="login-password" placeholder="預設: admin123" required class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-pink-300 focus:outline-none">
                </div>
                <button type="submit" id="btn-submit-login" class="w-full bg-gray-800 text-white py-3 rounded-xl font-bold hover:bg-gray-900 transition mt-2">
                    登入
                </button>
            </form>
            <p id="login-error" class="text-red-500 text-xs text-center mt-3 hidden"></p>
        </div>
    </div>

    <!-- 管理員控制台 -->
    <div id="view-admin-dashboard" class="flex-1 flex flex-col bg-white/90 backdrop-blur-md hidden h-screen overflow-hidden">
        <!-- 頂部導航 -->
        <header class="bg-white/80 shadow-sm px-6 py-4 flex justify-between items-center z-10 border-b border-gray-200">
            <h1 class="text-xl md:text-2xl font-bold text-gray-800 flex items-center">
                <div class="w-10 h-10 md:w-12 md:h-12 mr-3 rounded-full overflow-hidden border border-gray-200 shadow-sm bg-white flex items-center justify-center shrink-0">
                    <img src="logo1.png" alt="Logo" class="w-full h-full object-cover transform scale-[1.6] -translate-x-[8%] -translate-y-[4%]">
                </div>
                後台管理
            </h1>
            <div class="flex gap-4 items-center">
                <span id="admin-user-display" class="text-sm font-bold text-pink-600 hidden md:block bg-pink-50 px-3 py-1 rounded-full border border-pink-100"></span>
                <button id="btn-admin-home" class="text-gray-600 hover:text-pink-500 px-3 py-1"><i class="fa-solid fa-house"></i> 回首頁</button>
                <button id="btn-logout" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-full text-sm font-semibold hover:bg-gray-300">登出</button>
            </div>
        </header>

        <!-- 內容區 -->
        <div class="flex-1 overflow-auto p-6">
            <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <!-- 照片管理區 -->
                <div class="lg:col-span-2 bg-white rounded-3xl shadow-sm p-6 border border-gray-100 flex flex-col h-fit">
                    <div class="flex justify-between items-center mb-4 border-b pb-2">
                        <h2 class="text-xl font-bold text-gray-800">雲端照片庫</h2>
                        <div class="flex gap-2">
                            <button id="btn-select-all" class="text-sm bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1 rounded font-bold transition">本頁全選</button>
                            <button id="btn-batch-delete" class="text-sm bg-red-100 hover:bg-red-200 text-red-600 px-3 py-1 rounded font-bold transition hidden shadow-sm"><i class="fa-solid fa-trash mr-1"></i>刪除 (<span id="batch-delete-count">0</span>)</button>
                        </div>
                    </div>
                    <!-- 照片列表，使用 content-start 緊密排列 -->
                    <div id="admin-photos-grid" class="grid grid-cols-2 md:grid-cols-3 gap-3 content-start p-1 mb-2 w-full h-auto">
                        <div class="col-span-full text-center text-gray-400 py-10"><i class="fa-solid fa-spinner fa-spin"></i> 載入中...</div>
                    </div>
                    <!-- 分頁按鈕容器 -->
                    <div id="admin-photos-pagination" class="mt-2 border-t border-gray-100"></div>
                </div>

                <!-- 右側選單區 -->
                <div class="flex flex-col gap-6 h-fit">
                    <!-- 邊框管理區 -->
                    <div class="bg-white rounded-3xl shadow-sm p-6 border border-gray-100 flex flex-col h-fit">
                        <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">邊框管理</h2>
                        
                        <form id="form-add-frame" class="mb-6 bg-gray-50 p-4 rounded-xl border border-gray-200">
                            <h3 class="text-sm font-bold text-gray-700 mb-2">新增邊框 (圖片網址)</h3>
                            <input type="text" id="new-frame-name" placeholder="邊框名稱 (選填)" class="w-full text-sm px-3 py-2 border rounded-lg mb-2 focus:outline-none focus:ring-1 focus:ring-pink-300">
                            <textarea id="new-frame-url" required placeholder="輸入圖片 URL 或 Base64 格式" class="w-full text-sm px-3 py-2 border rounded-lg mb-3 focus:outline-none focus:ring-1 focus:ring-pink-300 h-20 resize-none"></textarea>
                            <p class="text-xs text-gray-500 mb-3"><i class="fa-solid fa-circle-info"></i> 建議使用透明背景的 PNG 或 Base64 (需支援跨域)</p>
                            <button type="submit" class="w-full bg-pink-500 text-white py-2 rounded-lg text-sm font-bold hover:bg-pink-600 transition">新增邊框</button>
                        </form>

                        <div class="overflow-y-auto custom-scrollbar h-[275px] pr-2">
                            <ul id="admin-frames-list" class="flex flex-col gap-3">
                                <li class="text-center text-gray-400 py-4"><i class="fa-solid fa-spinner fa-spin"></i> 載入中...</li>
                            </ul>
                        </div>
                    </div>

                    <!-- 系統設定區 -->
                    <div class="bg-white rounded-3xl shadow-sm p-6 border border-gray-100 flex flex-col h-fit">
                        <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">系統設定</h2>
                        <div class="flex flex-col gap-3">
                            <button id="btn-open-password-modal" class="w-full flex items-center justify-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-700 py-3 rounded-xl text-sm font-bold transition shadow-sm">
                                <i class="fa-solid fa-key"></i> 修改密碼
                            </button>
                            <button id="btn-open-collab-modal" class="w-full flex items-center justify-center gap-2 bg-pink-50 hover:bg-pink-100 text-pink-600 py-3 rounded-xl text-sm font-bold transition shadow-sm hidden">
                                <i class="fa-solid fa-user-plus"></i> 新增協作者
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // ---------------------------------------------------------
        // 1. Firebase 模組載入
        // ---------------------------------------------------------
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, signInWithCustomToken, updatePassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDoc, doc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        // ==========================================

        async function setupBoothMode() {
            currentMode = 'booth';
            switchView('view-booth');
            
            if (db && !unsubscribeFrames) {
                try {
                    const framesRef = collection(db, 'artifacts', appId, 'public', 'data', 'frames');
                    unsubscribeFrames = onSnapshot(framesRef, (snapshot) => {
                        frames = [...DEFAULT_FRAMES];
                        snapshot.forEach(doc => frames.push({ id: doc.id, ...doc.data(), isDefault: false }));
                        if (currentFrameIndex >= frames.length) currentFrameIndex = 0;
                        updateFrameImage();
                    }, (err) => {
                        frames = [...DEFAULT_FRAMES];
                        updateFrameImage();
                    });
                } catch (e) {
                    frames = [...DEFAULT_FRAMES];
                    updateFrameImage();
                }
            } else if (!db) {
                frames = [...DEFAULT_FRAMES];
                updateFrameImage();
            }

            await initMediaPipe();
            
            if (isWebcamRunning) {
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                animationFrameId = requestAnimationFrame(renderLoop);
            } else {
                await startWebcam();
            }
        }

        function updateFrameImage() {
            if (frames.length > 0) {
                if (!frames[currentFrameIndex].url.startsWith('data:')) {
                    currentFrameImage.crossOrigin = "anonymous"; 
                } else {
                    currentFrameImage.removeAttribute('crossOrigin');
                }
                currentFrameImage.src = frames[currentFrameIndex].url;
                const nameEl = document.getElementById('current-frame-name');
                if(nameEl) nameEl.innerText = frames[currentFrameIndex].name || `自訂邊框 ${currentFrameIndex + 1}`;
            } else {
                currentFrameImage.src = "";
                const nameEl = document.getElementById('current-frame-name');
                if(nameEl) nameEl.innerText = "無邊框";
            }
        }

        async function initMediaPipe() {
            if (gestureRecognizer) return; 
            try {
                const { GestureRecognizer, FilesetResolver } = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs");
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm"
                );
                gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO"
                });
                document.getElementById('gesture-hint').classList.remove('hidden');
            } catch (err) {
                document.getElementById('loading-text').innerText = "手勢辨識載入失敗，請使用按鈕拍照";
            }
        }

        async function startWebcam() {
            if (isWebcamRunning) return;
            try {
                const constraints = { video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } } };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                video.addEventListener('loadeddata', () => {
                    document.getElementById('loading-state').classList.add('hidden');
                    isWebcamRunning = true;
                    requestAnimationFrame(renderLoop);
                });
            } catch (err) {
                document.getElementById('loading-text').innerText = "無法存取相機，請確認權限";
            }
        }

        function renderLoop() {
            if (!isWebcamRunning || currentMode !== 'booth') return;

            if (video.videoWidth > 0 && video.videoHeight > 0) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                const size = Math.min(video.videoWidth, video.videoHeight);
                const startX = (video.videoWidth - size) / 2;
                const startY = (video.videoHeight - size) / 2;
                
                ctx.save();
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(video, startX, startY, size, size, 0, 0, canvas.width, canvas.height);
                ctx.restore();

                if (currentFrameImage.complete && currentFrameImage.naturalWidth > 0) {
                    try {
                        ctx.drawImage(currentFrameImage, 0, 0, canvas.width, canvas.height);
                    } catch (e) {}
                }
            }

            let nowInMs = Date.now();
            if (video.currentTime !== lastVideoTime && gestureRecognizer && !isCountingDown && !isShootingSequence) {
                lastVideoTime = video.currentTime;
                const results = gestureRecognizer.recognizeForVideo(video, nowInMs);
                
                if (results.gestures.length > 0) {
                    const categoryName = results.gestures[0][0].categoryName;
                    if (categoryName === "Open_Palm") {
                        startCountdown();
                    }
                }
            }

            animationFrameId = requestAnimationFrame(renderLoop);
        }

        // ==========================================
        // 拍照與連拍邏輯
        // ==========================================
        async function startCountdown(currentShotIndex = 1) {
            if (isCountingDown) return;
            isCountingDown = true;
            
            if (currentShotIndex === 1) {
                isShootingSequence = true;
                capturedShots = []; 
            }
            
            document.getElementById('gesture-hint').classList.add('hidden');
            const cdText = document.getElementById('countdown-text');
            cdText.classList.remove('opacity-0');
            
            const indicatorHtml = shootMode === 4 ? `<div class="text-3xl md:text-4xl mt-4 bg-black/50 px-5 py-2 rounded-full drop-shadow-md">第 ${currentShotIndex} / 4 張</div>` : '';
            
            for (let i = 3; i > 0; i--) {
                cdText.innerHTML = `<div class="flex flex-col items-center justify-center">${i}${indicatorHtml}</div>`;
                cdText.style.transform = 'scale(0.5)';
                setTimeout(() => cdText.style.transform = 'scale(1.5)', 50);
                await new Promise(r => setTimeout(r, 1000));
            }
            
            cdText.innerHTML = "";
            cdText.classList.add('opacity-0');
            takePhoto(currentShotIndex);
        }

        async function takePhoto(currentShotIndex) {
            const flash = document.getElementById('flash-overlay');
            flash.style.opacity = '1';
            setTimeout(() => flash.style.opacity = '0', 150);

            const imageData = canvas.toDataURL('image/jpeg', 0.8);
            capturedShots.push(imageData);
            isCountingDown = false; 
            
            if (shootMode === 1 || capturedShots.length === 4) {
                processFinalPhoto();
            } else {
                await new Promise(r => setTimeout(r, 1000));
                startCountdown(currentShotIndex + 1);
            }
        }

        async function processFinalPhoto() {
            let finalImageData = capturedShots[0];

            if (shootMode === 4) {
                document.getElementById('loading-state').classList.remove('hidden');
                document.getElementById('loading-text').innerText = "四格拼圖處理中...";
                await new Promise(r => setTimeout(r, 50)); 

                const compCanvas = document.createElement('canvas');
                compCanvas.width = CANVAS_SIZE * 2;
                compCanvas.height = CANVAS_SIZE * 2;
                const compCtx = compCanvas.getContext('2d');
                
                compCtx.fillStyle = 'white';
                compCtx.fillRect(0, 0, compCanvas.width, compCanvas.height);

                for (let i = 0; i < 4; i++) {
                    const img = new Image();
                    img.src = capturedShots[i];
                    await new Promise(r => img.onload = r);
                    const x = (i % 2) * CANVAS_SIZE;
                    const y = Math.floor(i / 2) * CANVAS_SIZE;
                    compCtx.drawImage(img, x, y, CANVAS_SIZE, CANVAS_SIZE);
                    
                    compCtx.strokeStyle = 'white';
                    compCtx.lineWidth = 10;
                    compCtx.strokeRect(x, y, CANVAS_SIZE, CANVAS_SIZE);
                }
                finalImageData = compCanvas.toDataURL('image/jpeg', 0.8);
                
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('loading-text').innerText = "正在初始化相機與 AI...";
            }

            isShootingSequence = false;
            capturedShots = []; 
            showResultView(finalImageData);
            uploadAndSavePhoto(finalImageData);
        }

        async function uploadAndSavePhoto(imageData) {
            if (db && auth && currentUserId) {
                try {
                    let finalImageUrl = imageData;
                    let driveFileId = "";

                    if (typeof GOOGLE_SCRIPT_URL !== 'undefined' && GOOGLE_SCRIPT_URL.startsWith("https://script.google.com/")) {
                        const res = await fetch(GOOGLE_SCRIPT_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                            body: JSON.stringify({
                                action: 'upload',
                                filename: `photobooth_${Date.now()}.jpg`,
                                image: imageData
                            })
                        });
                        const result = await res.json();
                        if (result.success) {
                            finalImageUrl = result.url;
                            driveFileId = result.fileId;
                        }
                    }

                    const photosRef = collection(db, 'artifacts', appId, 'public', 'data', 'photos');
                    const docRef = await addDoc(photosRef, {
                        imageUrl: finalImageUrl, 
                        driveFileId: driveFileId, 
                        timestamp: Date.now(),
                        userId: currentUserId
                    });
                    
                    const shareUrl = window.location.origin + window.location.pathname + '?view=' + docRef.id;
                    generateQRCode(shareUrl);
                } catch (err) {
                    generateQRCode(window.location.href); 
                }
            } else {
                generateQRCode(window.location.href);
            }
        }

                            errorEl.innerHTML = "密碼錯誤！<br>此帳號已存在，請使用您修改後的新密碼登入。<br><span class='text-gray-500 text-[10px] mt-1 block'>若忘記密碼，請至 Firebase 後台刪除帳號即可重置。</span>";

                errorEl.classList.remove('hidden');

        });

        // ==========================================
        // 後台管理邏輯
        // ==========================================
        async function setupAdminDashboard() {
            currentMode = 'admin';
            switchView('view-admin-dashboard');

            if (!currentUserId || !auth.currentUser) return; 

            const email = auth.currentUser.email || '';
            const username = email.split('@')[0];
            const isAdmin = username === 'admin';
            
            const userDisplay = document.getElementById('admin-user-display');
            if (userDisplay) {
                userDisplay.innerText = `${isAdmin ? '👑 管理者' : '👤 協作者'}：${username}`;
            }

            const btnCollabModal = document.getElementById('btn-open-collab-modal');
            if (btnCollabModal) {
                if (isAdmin) {
                    btnCollabModal.classList.remove('hidden');
                    btnCollabModal.classList.add('flex');
                } else {
                    btnCollabModal.classList.add('hidden');
                    btnCollabModal.classList.remove('flex');
                }
            }

            if(db) {
                const photosRef = collection(db, 'artifacts', appId, 'public', 'data', 'photos');
                if(unsubscribePhotos) unsubscribePhotos();
                
                unsubscribePhotos = onSnapshot(photosRef, (snapshot) => {
                    allAdminPhotos = [];
                    snapshot.forEach(doc => allAdminPhotos.push({ id: doc.id, ...doc.data() }));
                    allAdminPhotos.sort((a, b) => b.timestamp - a.timestamp);
                    renderAdminPhotos();
                });

                const framesRef = collection(db, 'artifacts', appId, 'public', 'data', 'frames');
                onSnapshot(framesRef, (snapshot) => {
                    let localFrames = [...DEFAULT_FRAMES];
                    snapshot.forEach(doc => localFrames.push({ id: doc.id, ...doc.data(), isDefault: false }));
                    renderAdminFrames(localFrames);
                });
            }
        }

        // 渲染相片 (包含核取方塊與分頁)
        function renderAdminPhotos() {
            const grid = document.getElementById('admin-photos-grid');
            const paginationContainer = document.getElementById('admin-photos-pagination');
            grid.innerHTML = '';
            
            if (allAdminPhotos.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center text-gray-400 py-10">尚無照片記錄</div>';
                if(paginationContainer) paginationContainer.innerHTML = '';
                return;
            }

            const totalPages = Math.ceil(allAdminPhotos.length / PHOTOS_PER_PAGE);
            if (currentPhotoPage > totalPages) currentPhotoPage = totalPages;
            if (currentPhotoPage < 1) currentPhotoPage = 1;

            const startIndex = (currentPhotoPage - 1) * PHOTOS_PER_PAGE;
            const endIndex = startIndex + PHOTOS_PER_PAGE;
            const currentPhotos = allAdminPhotos.slice(startIndex, endIndex);

            currentPhotos.forEach(photo => {
                const dateStr = new Date(photo.timestamp).toLocaleString('zh-TW', { hour12: false });
                const src = photo.imageUrl || photo.imageData; 
                const div = document.createElement('div');
                
                const isSelected = selectedPhotos.has(photo.id);
                div.className = `relative group rounded-xl overflow-hidden shadow-sm border h-fit transition-all duration-200 ${isSelected ? 'ring-4 ring-pink-500 scale-[0.98]' : ''}`;
                
                div.innerHTML = `
                    <img class="admin-photo-img w-full aspect-square object-cover" loading="lazy">
                    <div class="absolute top-3 left-3 z-20">
                        <input type="checkbox" class="photo-checkbox w-6 h-6 accent-pink-500 rounded cursor-pointer drop-shadow-md border-2 border-white shadow-sm" data-id="${photo.id}" ${isSelected ? 'checked' : ''}>
                    </div>
                    <div class="absolute inset-0 bg-black bg-opacity-50 opacity-0 group-hover:opacity-100 transition flex flex-col items-center justify-center gap-2 pointer-events-none">
                        <span class="text-white text-xs px-2 text-center">${dateStr}</span>
                        <button class="bg-red-500 text-white px-3 py-1 rounded-full text-sm hover:bg-red-600 shadow btn-del-photo pointer-events-auto" data-id="${photo.id}" data-drive-id="${photo.driveFileId || ''}">
                            <i class="fa-solid fa-trash"></i> 刪除
                        </button>
                    </div>
                `;
                
                const imgEl = div.querySelector('.admin-photo-img');
                imgEl.referrerPolicy = "no-referrer";
                imgEl.src = src; 

                const checkbox = div.querySelector('.photo-checkbox');
                checkbox.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        selectedPhotos.add(photo.id);
                        div.classList.add('ring-4', 'ring-pink-500', 'scale-[0.98]');
                    } else {
                        selectedPhotos.delete(photo.id);
                        div.classList.remove('ring-4', 'ring-pink-500', 'scale-[0.98]');
                    }
                    updateBatchDeleteUI();
                });
                
                grid.appendChild(div);
            });

            document.querySelectorAll('.btn-del-photo').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    if(!confirm('確定要刪除這張照片嗎？')) return;
                    const btnEl = e.target.closest('button');
                    const id = btnEl.dataset.id;
                    const driveFileId = btnEl.dataset.driveId;
                    
                    try {
                        if (driveFileId && typeof GOOGLE_SCRIPT_URL !== 'undefined' && GOOGLE_SCRIPT_URL.startsWith("https://script.google.com/")) {
                            await fetch(GOOGLE_SCRIPT_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                body: JSON.stringify({ action: 'delete', fileId: driveFileId })
                            }).catch(err => console.warn("Drive 檔案刪除失敗", err));
                        }
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'photos', id));
                        
                        selectedPhotos.delete(id);
                        updateBatchDeleteUI();
                    } catch (err) {}
                });
            });

            renderPaginationControls(totalPages);
        }

        // 分頁按鈕渲染
        function renderPaginationControls(totalPages) {
            const container = document.getElementById('admin-photos-pagination');
            if (!container) return;
            if (totalPages <= 1) { container.innerHTML = ''; return; }

            container.innerHTML = `
                <div class="flex justify-center items-center gap-4 pt-4 w-full">
                    <button id="btn-page-prev" class="px-4 py-2 rounded-full text-sm font-bold transition ${currentPhotoPage === 1 ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-pink-100 text-pink-600 hover:bg-pink-200 shadow-sm'}" ${currentPhotoPage === 1 ? 'disabled' : ''}>
                        <i class="fa-solid fa-chevron-left mr-1"></i> 上一頁
                    </button>
                    <span class="text-sm font-bold text-gray-600">第 ${currentPhotoPage} / ${totalPages} 頁</span>
                    <button id="btn-page-next" class="px-4 py-2 rounded-full text-sm font-bold transition ${currentPhotoPage === totalPages ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-pink-100 text-pink-600 hover:bg-pink-200 shadow-sm'}" ${currentPhotoPage === totalPages ? 'disabled' : ''}>
                        下一頁 <i class="fa-solid fa-chevron-right ml-1"></i>
                    </button>
                </div>
            `;

            document.getElementById('btn-page-prev')?.addEventListener('click', () => {
                if (currentPhotoPage > 1) { currentPhotoPage--; renderAdminPhotos(); }
            });
            document.getElementById('btn-page-next')?.addEventListener('click', () => {
                if (currentPhotoPage < totalPages) { currentPhotoPage++; renderAdminPhotos(); }
            });
        }

        // ==========================================
        // 批次刪除邏輯
        // ==========================================
        function updateBatchDeleteUI() {
            const btnBatchDelete = document.getElementById('btn-batch-delete');
            const countSpan = document.getElementById('batch-delete-count');
            if (!btnBatchDelete || !countSpan) return;

            if (selectedPhotos.size > 0) {
                btnBatchDelete.classList.remove('hidden');
                countSpan.innerText = selectedPhotos.size;
            } else {
                btnBatchDelete.classList.add('hidden');
            }
        }

        document.getElementById('btn-select-all')?.addEventListener('click', () => {
            const checkboxes = document.querySelectorAll('.photo-checkbox');
            const allCheckedOnPage = Array.from(checkboxes).every(cb => cb.checked);
            
            checkboxes.forEach(cb => {
                const photoId = cb.dataset.id;
                if (allCheckedOnPage) {
                    cb.checked = false;
                    selectedPhotos.delete(photoId);
                    cb.closest('div.group').classList.remove('ring-4', 'ring-pink-500', 'scale-[0.98]');
                } else {
                    cb.checked = true;
                    selectedPhotos.add(photoId);
                    cb.closest('div.group').classList.add('ring-4', 'ring-pink-500', 'scale-[0.98]');
                }
            });
            updateBatchDeleteUI();
        });

        document.getElementById('btn-batch-delete')?.addEventListener('click', async () => {
            if (selectedPhotos.size === 0) return;
            if (!confirm(`確定要刪除選取的 ${selectedPhotos.size} 張照片嗎？\n(此操作無法復原！)`)) return;
            
            const btn = document.getElementById('btn-batch-delete');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1"></i>刪除中...';

            try {
                const photosToDelete = allAdminPhotos.filter(p => selectedPhotos.has(p.id));
                const deletePromises = photosToDelete.map(async (photo) => {
                    if (photo.driveFileId && typeof GOOGLE_SCRIPT_URL !== 'undefined' && GOOGLE_SCRIPT_URL.startsWith("https://script.google.com/")) {
                        fetch(GOOGLE_SCRIPT_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify({ action: 'delete', fileId: photo.driveFileId })
                        }).catch(err => {});
                    }
                    return deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'photos', photo.id));
                });

                await Promise.all(deletePromises);
                selectedPhotos.clear();
                updateBatchDeleteUI();
                
            } catch (err) {
                alert("批次刪除時發生錯誤");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="fa-solid fa-trash mr-1"></i>刪除 (<span id="batch-delete-count">${selectedPhotos.size}</span>)`;
            }
        });

        // 渲染邊框列表
        function renderAdminFrames(localFrames) {
            const list = document.getElementById('admin-frames-list');
            list.innerHTML = '';
            
            if (localFrames.length === 0) {
                list.innerHTML = '<li class="text-center text-gray-400 py-4 text-sm">目前無邊框記錄。</li>';
                return;
            }

            const currentUser = auth.currentUser;
            const currentUid = currentUser ? currentUser.uid : null;
            const username = currentUser ? currentUser.email.split('@')[0] : '';
            const isAdmin = username === 'admin';

            localFrames.forEach(frame => {
                const li = document.createElement('li');
                li.className = "flex items-center gap-3 p-2 bg-gray-50 rounded-lg border mr-1";
                
                const isUploader = frame.uploaderUid === currentUid;
                const canDelete = !frame.isDefault && (isAdmin || isUploader);
                
                let actionHtml = '';
                if (frame.isDefault) {
                    actionHtml = `<span class="text-xs text-pink-600 bg-pink-100 px-2 py-1 rounded font-bold shadow-sm whitespace-nowrap">系統預設</span>`;
                } else if (canDelete) {
                    actionHtml = `<button class="text-red-400 hover:text-red-600 p-2 btn-del-frame" data-id="${frame.id}"><i class="fa-solid fa-trash"></i></button>`;
                } else {
                    actionHtml = `<span class="text-xs text-gray-500 bg-gray-200 px-2 py-1 rounded shadow-sm whitespace-nowrap">來自: ${frame.uploaderName || '其他人'}</span>`;
                }

                li.innerHTML = `
                    <div class="w-16 h-16 bg-gray-200 rounded overflow-hidden flex-shrink-0 relative checkerboard flex items-center justify-center">
                        <i class="fa-solid fa-image-slash text-gray-400 absolute z-0 text-xl"></i>
                        <img class="admin-frame-img w-full h-full object-contain absolute inset-0 z-10 bg-transparent">
                    </div>
                    <div class="flex-1 truncate text-sm font-semibold text-gray-700">
                        ${frame.name || '未命名邊框'}
                        <span class="error-badge hidden text-xs text-red-500 ml-2 bg-red-50 px-2 py-0.5 rounded border border-red-100">圖片失效</span>
                    </div>
                    ${actionHtml}
                `;
                
                const imgEl = li.querySelector('.admin-frame-img');
                const errBadge = li.querySelector('.error-badge');
                if (frame.url && !frame.url.startsWith('data:')) imgEl.crossOrigin = "anonymous";
                imgEl.referrerPolicy = "no-referrer";
                imgEl.onerror = () => { imgEl.style.display = 'none'; errBadge.classList.remove('hidden'); };
                imgEl.src = frame.url || ''; 
                
                list.appendChild(li);
            });

            document.querySelectorAll('.btn-del-frame').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.target.closest('button').dataset.id;
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'frames', id));
                });
            });
        }

        // 新增邊框
        document.getElementById('form-add-frame').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nameInput = document.getElementById('new-frame-name');
            const urlInput = document.getElementById('new-frame-url');
            const submitBtn = e.target.querySelector('button');
            
            const name = nameInput.value.trim();
            const url = urlInput.value.trim().replace(/^['"]+/, '').replace(/['"]+$/, '');
            if(!url) return;

            submitBtn.disabled = true;
            submitBtn.innerText = "驗證圖片中...";

            const testImg = new Image();
            if (!url.startsWith('data:')) testImg.crossOrigin = "anonymous"; 
            
            testImg.onload = async () => {
                submitBtn.innerText = "新增中...";
                try {
                    const framesRef = collection(db, 'artifacts', appId, 'public', 'data', 'frames');
                    const uploaderName = auth.currentUser ? auth.currentUser.email.split('@')[0] : 'unknown';
                    await addDoc(framesRef, {
                        name: name, url: url, timestamp: Date.now(),
                        uploaderUid: auth.currentUser ? auth.currentUser.uid : null,
                        uploaderName: uploaderName
                    });
                    nameInput.value = ''; urlInput.value = '';
                } catch (err) {
                    alert("新增邊框失敗！");
                } finally {
                    submitBtn.disabled = false; submitBtn.innerText = "新增邊框";
                }
            };
            testImg.onerror = () => {
                alert("❌ 圖片載入失敗！\n可能是防盜鏈或網址無效。");
                submitBtn.disabled = false; submitBtn.innerText = "新增邊框";
            };
            testImg.src = url;
        });

        // ==========================================
        // 系統設定：視窗開關與表單提交邏輯
        // ==========================================
        const modalPwd = document.getElementById('modal-change-password');
        const modalCollab = document.getElementById('modal-add-collaborator');

        document.getElementById('btn-open-password-modal')?.addEventListener('click', () => {
            modalPwd.classList.remove('hidden'); document.getElementById('change-pwd-msg').classList.add('hidden');
        });
        document.getElementById('btn-close-password-modal')?.addEventListener('click', () => modalPwd.classList.add('hidden'));

        document.getElementById('btn-open-collab-modal')?.addEventListener('click', () => {
            modalCollab.classList.remove('hidden'); document.getElementById('add-collab-msg').classList.add('hidden');
        });
        document.getElementById('btn-close-collab-modal')?.addEventListener('click', () => modalCollab.classList.add('hidden'));

        document.getElementById('form-change-password')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPwd = document.getElementById('new-password').value;
            const msgEl = document.getElementById('change-pwd-msg');
            const btn = e.target.querySelector('button');
            
            msgEl.classList.add('hidden'); btn.disabled = true; btn.innerText = "更新中...";

            try {
                if (!auth.currentUser || auth.currentUser.isAnonymous) throw new Error("無效身分。");
                await updatePassword(auth.currentUser, newPwd);
                msgEl.innerText = "✅ 更新成功！";
                msgEl.className = "text-sm text-center mt-4 text-green-600 font-bold bg-green-50 py-2 rounded-lg";
                e.target.reset();
                setTimeout(() => modalPwd.classList.add('hidden'), 1500);
            } catch (err) {
                msgEl.innerText = err.code === 'auth/requires-recent-login' ? "❌ 驗證過期，請重新登入。" : "❌ 失敗：" + err.message;
                msgEl.className = "text-sm text-center mt-4 text-red-500 font-bold bg-red-50 py-2 rounded-lg";
            } finally {
                msgEl.classList.remove('hidden'); btn.disabled = false; btn.innerText = "更新密碼";
            }
        });

        document.getElementById('form-add-collaborator')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('new-collab-username').value;
            const pwd = document.getElementById('new-collab-password').value;
            const email = getFakeEmail(username);
            const msgEl = document.getElementById('add-collab-msg');
            const btn = e.target.querySelector('button');
            
            msgEl.classList.add('hidden'); btn.disabled = true; btn.innerText = "建立中...";

            try {
                const appName = "SecondaryApp_" + Date.now();
                const secondaryApp = initializeApp(firebaseConfig, appName);
                const secondaryAuth = getAuth(secondaryApp);
                await createUserWithEmailAndPassword(secondaryAuth, email, pwd);
                await signOut(secondaryAuth); 
                msgEl.innerText = "✅ 建立成功！";
                msgEl.className = "text-sm text-center mt-4 text-green-600 font-bold bg-green-50 py-2 rounded-lg";
                e.target.reset();
                setTimeout(() => modalCollab.classList.add('hidden'), 1500);
            } catch (err) {
                msgEl.innerText = "❌ 建立失敗：" + err.message;
                msgEl.className = "text-sm text-center mt-4 text-red-500 font-bold bg-red-50 py-2 rounded-lg";
            } finally {
                msgEl.classList.remove('hidden'); btn.disabled = false; btn.innerText = "建立帳號";
            }
        });

        document.getElementById('btn-logout').addEventListener('click', async () => {
            if(auth) await signOut(auth);
            if(auth) await signInAnonymously(auth);
            setupBoothMode();
        });

        document.getElementById('btn-admin-home').addEventListener('click', () => {
            setupBoothMode();
        });

        const style = document.createElement('style');
        style.textContent = `
            .checkerboard {
                background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%);
                background-size: 10px 10px;
                background-position: 0 0, 0 5px, 5px -5px, -5px 0px;
            }
        `;
        document.head.appendChild(style);

        // ==========================================
        // 啟動入口
        // ==========================================
        window.addEventListener('load', initApp);
    </script>
</body>
</html>
